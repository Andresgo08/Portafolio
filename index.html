<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe - Portafolio y Contacto</title>
    <style>
        /* Reset de estilos básico */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
        }

        /* Barra de navegación superior */
        nav {
            background-color: #f15a24; /* Color naranja de la paleta */
            padding: 15px 60px;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 35px;
        }

        nav ul li a {
            color: #000000;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
        }

        nav ul li a:hover {
            opacity: 0.8;
        }

        /* Contenedor principal */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        /* Estructura de líneas divisorias dobles */
        .divider-container {
            margin: 25px 0 35px 0;
        }

        .divider {
            border: none;
            border-top: 1px solid #b5b5b5;
            margin-bottom: 6px;
        }

        /* Sección de Proyectos */
        .projects-section h2 {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 15px;
        }

        .project-card {
            background-color: #e5e5e5;
            aspect-ratio: 1 / 1;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-weight: bold;
            font-size: 18px;
            color: #333333;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Estilos simulados para las tarjetas basados en el wireframe */
        .card-1 { background-color: #c2beb9; }
        .card-2 { background-color: #1a1a1a; color: #ffffff; }
        .card-3 { background-color: #ffffff; border: 1px solid #eaeaea; color: #d44919; }
        .card-4 { background-color: #f6ebd9; }

        /* Sección de Formulario de Contacto */
        .contact-section {
            max-width: 550px;
            margin: 50px auto;
            text-align: center;
        }

        .contact-section h2 {
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 35px;
        }

        .form-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 16px 20px;
            background-color: #e9e9e9; /* Gris claro de los inputs */
            border: 1px solid #b5b5b5;
            border-radius: 20px; /* Bordes muy redondeados del wireframe */
            font-size: 16px;
            outline: none;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            background-color: #e2e2e2;
            border-color: #f15a24;
        }

        .form-group textarea {
            resize: none;
            height: 55px; /* Formato de caja del wireframe */
        }

        /* Botón de envío naranja */
        .btn-container {
            display: flex;
            justify-content: center;
            margin-top: 30px;
        }

        .btn-submit {
            background-color: #f15a24;
            color: #ffffff;
            border: none;
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background-color 0.2s ease;
        }

        .btn-submit:hover {
            background-color: #d44919;
        }

        /* Adaptabilidad para dispositivos móviles */
        @media (max-width: 768px) {
            nav {
                justify-content: center;
                padding: 15px;
            }
            .projects-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>

    <!-- Menú Superior -->
    <nav>
        <ul>
            <li><a href="#">Perfil profesional</a></li>
            <li><a href="#">Introducción</a></li>
            <li><a href="#">Proyectos</a></li>
            <li><a href="#">Info</a></li>
        </ul>
    </nav>

    <div class="container">

        <!-- Líneas divisorias superiores -->
        <div class="divider-container">
            <hr class="divider">
            <hr class="divider">
        </div>

        <!-- Sección Proyectos -->
        <section class="projects-section">
            <h2>Proyectos destacados</h2>
            <div class="projects-grid">
                <div class="project-card card-1"></div>
                <div class="project-card card-2">SPETSBOJ</div>
                <div class="project-card card-3">JUICY</div>
                <div class="project-card card-4"></div>
            </div>
        </section>

        <!-- Líneas divisorias inferiores -->
        <div class="divider-container">
            <hr class="divider">
            <hr class="divider">
        </div>

        <!-- Formulario de Contacto -->
        <section class="contact-section">
            <h2>Contacto</h2>
            
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre">
                </div>

                <div class="form-group">
                    <label for="correo">Correo</label>
                    <input type="email" id="correo" name="correo">
                </div>

                <div class="form-group">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje"></textarea>
                </div>

                <div class="btn-container">
                    <button type="submit" class="btn-submit">
                        Enviar &gt;
                    </button>
                </div>
            </form>
        </section>

    </div>

</body>
</html>
